var tFetch=function(url,opts,ms){
  return Promise.race([
    fetch(url,opts||{}),
    new Promise(function(_,rej){setTimeout(function(){rej(new Error('timeout'));},ms||6000);})
  ]);

function extractDanawaInfo(html){
  let img=null;
  const imgM=html.match(/(?:https?:\/\/|\/\/)img\.danuri\.io\/catalog-image\/[0-9a-zA-Z\/\-_]+\.(?:jpg|jpeg|png|webp)/i);
  if(imgM){
    let raw=imgM[0];if(raw.startsWith('//'))raw='https:'+raw;
    raw=raw.split('?')[0];
    img=`https://images.weserv.nl/?url=${encodeURIComponent(raw)}&w=96&h=96&fit=contain&output=jpg`;
  }
  let price=null;
  // og:description 메타 태그에서 직접 추출 (가장 안정적)
  const m0=html.match(/content="최저가\s+([\d,]{5,})원/);if(m0)price=m0[1]+'원';
  if(!price){const m1=html.match(/최저가\s+([\d,]{5,})원/);if(m1)price=m1[1]+'원';}
  if(!price){const m2=html.match(/<strong>([\d,]{5,})<\/strong>\s*원/);if(m2)price=m2[1]+'원';}
  if(!price){const m3=html.match(/"lowPrice"\s*:\s*"?([\d]{5,})"?/);if(m3)price=Number(m3[1]).toLocaleString('ko-KR')+'원';}
  // 최저가 추가 패턴: "5,608,180 원" 형태
  if(!price){const m4=html.match(/([\d,]{6,})\s*원[\s\S]{0,30}(?:무료배송|쿠팡|최저)/);if(m4)price=m4[1]+'원';}
  if(!price)return img?{price:null,mall:null,img}:null;
  let mall=null;
  const cmpny1=html.match(/cmpny_info[^>]+alt="([^"]{2,20})"/);
  const cmpny2=html.match(/alt="([^"]{2,20})"[^>]+cmpny_info/);
  if(cmpny1) mall=cmpny1[1].trim();
  else if(cmpny2) mall=cmpny2[1].trim();
  if(!mall){
    const mallPatterns=[
      /"lowestMallName"\s*:\s*"([^"]{2,30})"/,
      /"shopNm"\s*:\s*"([^"]{2,30})"/,
      /"mallName"\s*:\s*"([^"]{2,30})"/,
      /"sellerName"\s*:\s*"([^"]{2,30})"/,
      /class="[^"]*mall[_\-]?name[^"]*"[^>]*>\s*([^<\s][^<]{1,28}?)\s*</,
    ];
    for(const p of mallPatterns){const m=html.match(p);if(m&&m[1]&&m[1].trim().length>1){mall=m[1].trim();break;}}
  }
  return{price,mall,img};
}
async function proxyGet(url){
  const enc=encodeURIComponent(url);
  // 4개 프록시 동시 경쟁 — Promise.race+setTimeout으로 확실한 타임아웃
  const allorigins=tFetch('https://api.allorigins.win/get?url='+enc,{},7000)
    .then(r=>r.ok?r.json():null).then(j=>j&&j.contents&&j.contents.length>500?j.contents:null).catch(()=>null);
  const codetabs=tFetch('https://api.codetabs.com/v1/proxy?quest='+enc,{},7000)
    .then(r=>r.ok?r.text():null).then(t=>t&&t.length>500?t:null).catch(()=>null);
  const corsproxy=tFetch('https://corsproxy.io/?url='+enc,{},7000)
    .then(r=>r.ok?r.text():null).then(t=>t&&t.length>500?t:null).catch(()=>null);
  const thingproxy=tFetch('https://thingproxy.freeboard.io/fetch/'+url,{},7000)
    .then(r=>r.ok?r.text():null).then(t=>t&&t.length>500?t:null).catch(()=>null);
  const result=await Promise.any([
    allorigins.then(function(r){return r||Promise.reject();}),
    codetabs.then(function(r){return r||Promise.reject();}),
    corsproxy.then(function(r){return r||Promise.reject();}),
    thingproxy.then(function(r){return r||Promise.reject();}),
  ]).catch(function(){return null;});
  if(!result)throw new Error('proxy fail');
  return result;
}
async function fetchDanawa(pcode){
  const key='dp:'+pcode;if(key in priceCache)return priceCache[key];
  try{
    const html=await proxyGet(`https://prod.danawa.com/info/?pcode=${pcode}`);
    const info=extractDanawaInfo(html);
    const href=`https://prod.danawa.com/info/?pcode=${pcode}`;
    priceCache[key]=info?.price?{price:info.price,src:'다나와',mall:info.mall||null,img:info.img||null,href}:null;
    if(info?.img&&!priceCache[key])priceCache['img:'+pcode]=info.img;
  }catch(e){return null;}
  return priceCache[key];
}

}

    var ACCESSORY_KW=['전용시트','전용커버','전용쿠션','전용매트','호환시트','호환쿠션','시트커버','쿠션커버','전용등받이','패드커버'];

    }
    if(item&&item.lprice){
      var mallName=(item.mallName||'네이버').replace(/<[^>]*>/g,'');
      var result={price:fmtPrice(item.lprice),src:'네이버',mall:mallName,img:item.image||null,href:item.link||'https://search.shopping.naver.com/search/all?query='+encodeURIComponent(query)+'&sort=price_asc'};
      // 주 가격이 리퍼/중고/전시인 경우 타입 표시
      if(itemIsSec){

        });
      }

    } else {return null;}
  }catch(e){return null;}

async function loadBrandPrices(brand){
  activeFetchBrand=brand;

  const hasNaver=!!(NAVER_CLIENT_ID&&NAVER_CLIENT_SECRET);
  models.forEach((m,i)=>{

  });
  // 5개 워커 동시 처리
  var idx=0;
  var workerFn=async function(){
    while(idx<models.length){
      if(activeFetchBrand!==brand)return;
      var i=idx++;
      var m=models[i];
      if(m.price!=='문의 필요'){
        var pair=await Promise.all([
          hasNaver?fetchNaver(m.full,m.name).catch(function(){return null;}):Promise.resolve(null),
          (m.pcode?fetchDanawa(m.pcode).then(function(r){return r||fetchDanawaSearch(m.full);}):fetchDanawaSearch(m.full)).catch(function(){return null;})
        ]);
        if(activeFetchBrand!==brand)return;
        var naver=pair[0],danawa=pair[1];
        var imgSrc=danawa?.img||(m.pcode?priceCache['img:'+m.pcode]:null)||naver?.img||null;
        if(imgSrc){var imgEl=document.getElementById('img-'+brand+'-'+i);if(imgEl){imgEl.onerror=null;imgEl.src=imgSrc;}}
        setCellPriceDual('pc-'+brand+'-'+i,danawa,naver);
        if(danawa||naver){savePriceCache(brand,i,danawa,naver);renderPriceChart(brand);}
      }
    }
  };
  // 25초 안전망: 아직 "조회중" 상태면 강제로 "—"로 변경
  var cleanupTimer=setTimeout(function(){
    models.forEach(function(m,i){
      var el=document.getElementById('pc-'+brand+'-'+i);
      if(el&&el.querySelector('.price-loading')){
        el.innerHTML='<span style="color:#d1d5db;font-size:11px">—</span>';

  },25000);
  await Promise.all([workerFn(),workerFn(),workerFn(),workerFn(),workerFn()]);
  clearTimeout(cleanupTimer);

      ?`<img id="${imgId}" class="model-img" src="${staticImg}" onerror="this.onerror=null;this.src='https://corsproxy.io/?url='+encodeURIComponent('${staticImg}');this.onerror=function(){this.src='${BLANK}'}">`
      :`<img id="${imgId}" class="model-img" src="${BLANK}">`;
    var yearBadge=m.year?'<span style="font-size:9px;background:#e0f2fe;color:#0369a1;border-radius:3px;padding:1px 5px;font-weight:700">'+m.year+'</span>':'';
    return'<div class="prow">'+imgEl+'<div class="prow-name"><div class="model-cell">'+m.name+'</div><div class="model-sub">'+m.sub+' '+yearBadge+'</div></div><div class="prow-price" id="'+cellId+'">'+priceContent+'</div></div>';
  }).join('');
  document.getElementById('price-compare-table').innerHTML=`<div id="price-chart-wrap"><div class="plist">${rows}</div><div id="price-chart-box"><div class="chart-head">📊 모델별 최저가 비교</div><div id="price-chart-bars"><span style="font-size:11px;color:#9ca3af">가격 조회중...</span></div></div></div>`;
  loadBrandPrices(brand);
}
function setPriceBrand(btn,brand){document.querySelectorAll('.pb-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderPriceTable(brand);}
function renderPriceChart(brand){
  var el=document.getElementById('price-chart-bars');if(!el)return;
  var models=PRICE_MODELS[brand]||[];
  var pts=models.map(function(m,i){
    var dc=priceCache['dp:'+m.pcode]||priceCache['ds:'+m.full]||null;
    var nc=priceCache['np:'+m.full]||null;
    var best=null;
    if(dc&&nc){best=toNum(dc.price)<=toNum(nc.price)?dc:nc;}else{best=dc||nc;}
    var p=best?toNum(best.price):null;
    var mallName=best?.mall||(best?.src==='다나와'?'다나와':'네이버');
    var color=MALL_COLOR[mallName]||SRC_COLOR[best?.src]||'#9ca3af';
    return{name:m.name,price:p,color:color};
  }).filter(function(p){return p.price&&p.price<Infinity;});
  if(pts.length===0){el.innerHTML='<span style="font-size:11px;color:#9ca3af">가격 조회중...</span>';return;}
  var maxP=Math.max.apply(null,pts.map(function(p){return p.price;}));
  var rows=pts.map(function(p){
    var pct=Math.max(4,Math.round(p.price/maxP*100));
    var lbl=p.price.toLocaleString('ko-KR')+'원';
    return'<div class="chart-row"><div class="chart-name" title="'+p.name+'">'+p.name+'</div><div class="chart-bar-wrap"><div class="chart-bar" style="width:'+pct+'%;background:'+p.color+'"></div><span class="chart-price-lbl">'+lbl+'</span></div></div>';
  }).join('');
  el.innerHTML=rows;
}

const PROXIES=[url=>`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,url=>`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`];
function rssUrl(q){return`https://news.google.com/rss/search?q=${encodeURIComponent(q)}&hl=ko&gl=KR&ceid=KR:ko`;}
function stripHtml(s){return(s||'').replace(/<[^>]*>/g,'').replace(/&quot;/g,'"').replace(/&amp;/g,'&').trim();}
function relTime(d){const diff=Math.floor((Date.now()-new Date(d))/60000);if(diff<1)return'방금';if(diff<60)return diff+'분 전';if(diff<1440)return Math.floor(diff/60)+'시간 전';return Math.floor(diff/1440)+'일 전';}
async function loadNews(query,elId){
  const el=document.getElementById(elId);
  el.innerHTML='<div class="loading"><div class="spinner"></div>불러오는 중...</div>';
  let lastErr;
  for(const pFn of PROXIES){
    try{
      const resp=await fetch(pFn(rssUrl(query)),{signal:AbortSignal.timeout(9000)});
      if(!resp.ok)throw new Error('HTTP '+resp.status);
      const ct=resp.headers.get('content-type')||'';
      let xml;if(ct.includes('json')){const j=await resp.json();xml=j.contents??'';}else xml=await resp.text();
      if(!xml)throw new Error('empty');
      const doc=new DOMParser().parseFromString(xml,'text/xml');
      if(doc.querySelector('parsererror'))throw new Error('parse fail');
      const items=[...doc.querySelectorAll('item')].slice(0,5);
      if(!items.length)throw new Error('no items');
      const html=items.map(it=>{
        const title=stripHtml(it.querySelector('title')?.textContent||'');
        const linkEl=it.getElementsByTagName('link')[0];
        const link=(linkEl?.nextSibling?.nodeValue||linkEl?.textContent||it.querySelector('guid')?.textContent||'#').trim();
        const pub=it.querySelector('pubDate')?.textContent||'';
        const src=it.querySelector('source')?.textContent||'';
        return`<div class="news-item"><a href="${link}" target="_blank"><div class="news-title">${title}</div><div class="news-meta">${src}${pub?' · '+relTime(pub):''}</div></a></div>`;
      }).join('');
      const ts=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
      el.innerHTML=html+`<div class="ts">${ts} 기준</div>`;
      return;
    }catch(e){lastErr=e;await new Promise(r=>setTimeout(r,800));}
  }
  el.innerHTML=`<div class="error-box">로드 실패 — 새로고침을 눌러 재시도하세요</div>`;
}
async function init(){
  const now=new Date();
  document.getElementById('ts-header').textContent=now.toLocaleDateString('ko-KR',{month:'long',day:'numeric'})+' '+now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})+' 기준';
  updateNaverBtn();
  // 네이버 API 미설정 시 패널 자동 열기
  if(!NAVER_CLIENT_ID||!NAVER_CLIENT_SECRET){
    document.getElementById('naver-api-setup').style.display='block';
  }
  renderPriceTable('파나소닉');
  await loadNews('쇼핑 유통 이커머스','shopping-news');
}
init();
setInterval(()=>{ refreshPrices(); loadNews('쇼핑 유통 이커머스','shopping-news'); }, 5*60*1000);
</script>
